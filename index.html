<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>


    <div class="wrapper show-category">
        <div class="screen-backdrop"></div>
        <div class="screen home-screen">
            <div class="head-wrapper">
                <div class="menu-btn">
                    <i class="fas fa-bars"></i>
                </div>
                <div class="welcome">
                    <div class="content">
                        <h3>Hello, What's Up</h3>
                        <p>Today You have <span class="totalTasks">5</span> Tasks</p>
                    </div>
                    <div class="img">
                        <div class="backdrop"></div>
                        <img src="images/boy.png" alt="">
                    </div>
                </div>
            </div>

            <div class="categories-wrapper">
                <div class="categories">
                    <div class="category">
                        <div class="left">
                            <img src="images/boy(1).png" alt="">
                            <div class="content">
                                <h1>Personal</h1>
                                <p>8 Task</p>
                            </div>
                        </div>
                        <div class="options">
                            <div class="toggle-btn">
                                <i class="fas fa-ellipsis-v"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div> 

        <div class="screen category-screen">
            <div class="head-wrapper">
                <div class="back-btn">
                    <i class="fas fa-arrow-left"></i>
                </div>
                <div class="options">
                    <i class="fa-solid fa-ellipsis-v"></i>
                </div>
            </div>
            <div class="category-details">
                <img src="images/boy.png" alt="" id="category-img">
                <div class="details">
                    <p class="category-task">8 Tasks</p>
                    <h1 class="category-title">Personal</h1>
                </div>
            </div>
            <div class="tasks-wrapper">
                <div class="tasks">
                    <div class="task-wrapper">
                        <label for="task" class="task">
                            <input type="checkbox" name="" id="task">
                            <span class="checkmark">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                                    stroke-width="1.5" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
                                </svg>
                            </span>
                            <p>Do 10 minute meditaion</p>
                        </label>
                        <div class="delete">
                            <i class="fas fa-trash"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="add-task-btn">
            <i class="fa fa-plus"></i>
        </div>



        <div class="black-backdrop"></div>


        <div class="add-task">
            <div class="add-task-backdrop"></div>
            <h1 class="heading">Add Task</h1>
            <div class="input-group">
                <label for="task-input">Task</label>
                <input type="text" id="task-input" requried>
            </div>

            <div class="input-group">
                <label for="category-select">Category</label>
                <select name="" id="category-select">
                    <option value="personal">Personal</option>

                </select>
            </div>
            <div class="btn">
                 <button class="cancel-btn">Cancel</button>
                 <button class="add-btn">Add</button>
            </div>
        </div>
    </div>







    <script src="script.js"></script>
</body>

</html>
